name: publish

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      # OIDC trusted publishing requires node >=22.14.0 and npm >=11.5.1
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish package to NPM 📦
        run: npm publish --access public --provenance
